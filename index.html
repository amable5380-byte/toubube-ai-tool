<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KyungHo Voice To-Do</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --kh-blue: #003399;
            --kh-accent: #ff4d4f;
            --bg-light: #f4f7fa;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 450px;
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 51, 153, 0.1);
            border-top: 8px solid var(--kh-blue);
        }

        h2 { text-align: center; color: var(--kh-blue); font-weight: 800; margin-bottom: 2rem; }

        .input-group { display: flex; gap: 8px; margin-bottom: 2rem; position: relative; }
        
        input {
            flex: 1;
            padding: 14px 45px 14px 14px; /* 마이크 아이콘 자리를 위해 오른쪽 패딩 확보 */
            border: 2px solid #e5e8eb;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }

        /* 마이크 버튼 스타일 */
        .mic-btn {
            position: absolute;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #adb5bd;
            transition: 0.2s;
        }
        .mic-btn.recording { color: var(--kh-accent); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .add-btn {
            padding: 0 20px;
            background: var(--kh-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        ul { list-style: none; padding: 0; }
        li {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f2f4f6;
        }

        .star-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-right: 10px; color: #ccc; }
        .star-btn.active { color: #ffcc00; }
        .todo-content { flex: 1; cursor: pointer; font-weight: 500; }
        .completed { text-decoration: line-through; color: #adb5bd; }
        .del-btn { color: #ff4d4f; background: none; border: none; cursor: pointer; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>KYUNGHO VOICE TODO</h2>
    <div class="input-group">
        <input type="text" id="todoInput" placeholder="말씀하시거나 입력하세요...">
        <button id="micBtn" class="mic-btn" onclick="startVoice()">🎙️</button>
        <button class="add-btn" onclick="addTodo()">등록</button>
    </div>
    <ul id="todoList"></ul>
</div>

<script>
    const input = document.getElementById('todoInput');
    const micBtn = document.getElementById('micBtn');
    const list = document.getElementById('todoList');
    let todos = JSON.parse(localStorage.getItem('khTodos')) || [];

    // 음성 인식 설정 (Web Speech API)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ko-KR';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => { micBtn.classList.add('recording'); };
        recognition.onend = () => { micBtn.classList.remove('recording'); };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            input.value = transcript;
            setTimeout(addTodo, 500); // 인식이 끝나면 0.5초 뒤 자동 등록
        };
    }

    function startVoice() {
        if (!recognition) {
            alert("이 브라우저는 음성 인식을 지원하지 않습니다. 크롬(Chrome)을 권장합니다.");
            return;
        }
        recognition.start();
    }

    function render() {
        list.innerHTML = '';
        const sortedTodos = [...todos].sort((a, b) => b.star - a.star);

        sortedTodos.forEach((todo) => {
            const index = todos.indexOf(todo);
            const li = document.createElement('li');
            li.innerHTML = `
                <button class="star-btn ${todo.star ? 'active' : ''}" onclick="toggleStar(${index})">
                    ${todo.star ? '★' : '☆'}
                </button>
                <span class="todo-content ${todo.done ? 'completed' : ''}" onclick="toggleDone(${index})">
                    ${todo.text}
                </span>
                <button class="del-btn" onclick="remove(${index})">삭제</button>
            `;
            list.appendChild(li);
        });
        localStorage.setItem('khTodos', JSON.stringify(todos));
    }

    function addTodo() {
        if (!input.value.trim()) return;
        todos.push({ text: input.value, done: false, star: false });
        input.value = '';
        render();
    }

    function toggleDone(index) {
        todos[index].done = !todos[index].done;
        if (todos[index].done) {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#003399', '#ffffff', '#ffcc00']
            });
        }
        render();
    }

    function toggleStar(index) {
        todos[index].star = !todos[index].star;
        render();
    }

    function remove(index) {
        todos.splice(index, 1);
        render();
    }

    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') addTodo(); });
    render();
</script>

</body>
</html>
